<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- GUI Automation Logo Animated -->
  <defs>
    <linearGradient id="guiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9C27B0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Monitor -->
  <rect x="15" y="20" width="90" height="60" rx="5" fill="url(#guiGradient)" opacity="0.9">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Screen -->
  <rect x="20" y="25" width="80" height="50" fill="#1a1a1a"/>

  <!-- Windows/elements on screen -->
  <rect x="25" y="30" width="35" height="20" fill="#4CAF50" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.9;0.7" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="65" y="30" width="30" height="15" fill="#2196F3" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.9;0.7" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="25" y="55" width="70" height="15" fill="#FF9800" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Stand -->
  <rect x="55" y="80" width="10" height="10" fill="#666"/>

  <!-- Base -->
  <rect x="40" y="90" width="40" height="5" rx="2" fill="#666"/>

  <!-- Mouse cursor -->
  <polygon points="80,45 80,55 85,50" fill="#FFF" opacity="0.9">
    <animate attributeName="points" values="80,45 80,55 85,50; 85,45 85,55 90,50; 80,45 80,55 85,50" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Click effect -->
  <circle cx="82" cy="50" r="5" fill="none" stroke="#FFF" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;15;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Keyboard -->
  <rect x="25" y="100" width="70" height="12" rx="2" fill="#888" opacity="0.8">
    <animate attributeName="fill" values="#888;#AAA;#888" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Keys -->
  <g fill="#666">
    <rect x="28" y="102" width="4" height="8">
      <animate attributeName="fill" values="#666;#4CAF50;#666" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="34" y="102" width="4" height="8">
      <animate attributeName="fill" values="#666;#4CAF50;#666" dur="1s" begin="0.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="40" y="102" width="4" height="8">
      <animate attributeName="fill" values="#666;#4CAF50;#666" dur="1s" begin="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="46" y="102" width="4" height="8">
      <animate attributeName="fill" values="#666;#4CAF50;#666" dur="1s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
